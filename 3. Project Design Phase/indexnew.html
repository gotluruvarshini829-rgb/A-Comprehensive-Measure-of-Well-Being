<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HDI Estimation Engine</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #dff6a0; }
        .container { max-width: 500px; margin: auto; background: rgb(251, 159, 116); padding: 25px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #e2e8e9; border-radius: 4px; }
        button { width: 100%; background: #28a745; color: rgb(8, 235, 235); padding: 10px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; padding: 15px; background: #f0eeef; border-left: 5px solid #f8fcf9; font-size: 18px; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 15px; color: #f80808; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>HDI Predictor Screen</h2>
        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Select Target Analogue Country:</label>
                <select name="country">
                    {% for c in countries %}
                        <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Life Expectancy (Years: 40 - 90):</label>
                <input type="number" step="0.1" name="life_exp" min="40" max="90" required value="75">
            </div>
            <div class="form-group">
                <label>Mean Years of Schooling (0 - 20):</label>
                <input type="number" step="0.1" name="schooling" min="0" max="20" required value="12">
            </div>
            <div class="form-group">
                <label>GNI Per Capita ($ USD):</label>
                <input type="number" name="gni" min="500" max="150000" required value="30000">
            </div>
            <button type="submit">Predict HDI Score</button>
        </form>
        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
        <a href="/" class="back-link">← Return to Homepage</a>
    </div>
</body>
</html>
